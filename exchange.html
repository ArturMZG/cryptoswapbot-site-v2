<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Обмен криптовалют | CryptoSwap Bot</title>
    <meta name="description" content="Мгновенный обмен криптовалют через Telegram-бота. Покупка и продажа BTC, ETH, USDT за рубли, доллары, евро и другие валюты.">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    
    <style>
        .widget-container {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            padding: 0 10px;
        }
        iframe {
            width: 100%;
            height: 620px;
            border: none;
            border-radius: 16px;
        }
        .back-link {
            display: inline-block;
            margin: 20px 0 10px;
            color: #00C26F;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="lang-switcher">
            <button onclick="switchLang('ru')">RU</button>
            <button onclick="switchLang('en')">EN</button>
            <button onclick="switchLang('es')">ES</button>
            <button onclick="switchLang('pt')">PT</button>
            <button onclick="switchLang('tr')">TR</button>
        </div>
        <h1>🔄 Покупка криптовалюты 🔄</h1>
        <p class="subtitle">Виджет от ChangeNOW – безопасно и быстро</p>
    </header>

    <div class="widget-container">
        <!-- Статический iframe с оригинальными параметрами, но с возможностью динамической замены src через JS -->
        <iframe id="changeNowWidget" 
            src="https://changenow.io/embeds/exchange-widget/v2/widget.html?FAQ=true&amount=0.1&amountFiat=1500&backgroundColor=FFFFFF&darkMode=false&from=btc&fromFiat=eur&horizontal=false&isFiat&lang=en-US&link_id=9ccfa63406d1d6&locales=true&logo=true&primaryColor=00C26F&to=eth&toFiat=eth&toTheMoon=true"
            style="height: 620px; width: 100%; border: none; border-radius: 16px;"></iframe>
    </div>

    <footer style="text-align: center; margin-top: 20px;">
        <a href="/" class="back-link">← На главную</a>
        <p class="disclaimer">
            Сервис использует виджет ChangeNOW. Все обмены осуществляются через партнёра. 
            <a href="https://changenow.io/terms" target="_blank">Условия ChangeNOW</a>
        </p>
    </footer>

    <script defer type='text/javascript' src='https://changenow.io/embeds/exchange-widget/v2/stepper-connector.js'></script>

    <script>
        // Функция для обновления iframe при смене языка/валюты
        function updateWidget() {
            const urlParams = new URLSearchParams(window.location.search);
            let lang = urlParams.get('lang') || 'ru';
            let fromFiat = urlParams.get('fromFiat') || 'rub';
            let darkMode = urlParams.get('darkMode') === 'true' ? true : false;
            
            // Сопоставление языка и фиата
            const fiatMap = { ru: 'rub', en: 'usd', es: 'eur', pt: 'brl', tr: 'try' };
            if (fromFiat === 'rub' && lang !== 'ru') fromFiat = fiatMap[lang] || 'usd';
            
            // Базовый URL (можно взять из атрибута src, но проще сформировать заново)
            let baseUrl = 'https://changenow.io/embeds/exchange-widget/v2/widget.html?';
            let params = {
                FAQ: 'true',
                amount: '0.1',
                amountFiat: '1500',
                backgroundColor: darkMode ? '1A1A1A' : 'FFFFFF',
                darkMode: darkMode ? 'true' : 'false',
                from: 'btc',
                fromFiat: fromFiat,
                horizontal: 'false',
                isFiat: 'true',
                lang: lang === 'ru' ? 'ru' : (lang === 'tr' ? 'tr' : (lang === 'pt' ? 'pt' : (lang === 'es' ? 'es' : 'en'))),
                link_id: '9ccfa63406d1d6',
                locales: 'true',
                logo: 'true',
                primaryColor: '00C26F',
                to: 'usdterc20',   // можно оставить eth, но usdt удобнее
                toFiat: fromFiat,
                toTheMoon: 'true'
            };
            const url = baseUrl + new URLSearchParams(params).toString();
            document.getElementById('changeNowWidget').src = url;
        }

        // Переключение языка
        window.switchLang = function(targetLang) {
            const url = new URL(window.location.href);
            url.searchParams.set('lang', targetLang);
            const fiatMap = { ru: 'rub', en: 'usd', es: 'eur', pt: 'brl', tr: 'try' };
            url.searchParams.set('fromFiat', fiatMap[targetLang] || 'usd');
            if (targetLang === 'pt') url.searchParams.set('darkMode', 'true'); // для примера
            window.location.href = url.toString();
        };

        // При загрузке страницы обновляем виджет согласно параметрам URL
        window.addEventListener('DOMContentLoaded', () => {
            updateWidget();
        });
    </script>
</body>
</html>
