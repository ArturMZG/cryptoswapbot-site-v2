<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Покупка криптовалюты | CryptoSwap Bot</title>
    <meta name="description" content="Мгновенный обмен криптовалют через Telegram-бота. Покупка BTC, ETH, USDT за рубли, доллары, евро.">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        /* Глобальное центрирование и отступы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            background-color: #0f0f0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .lang-switcher {
            text-align: center;
            margin-bottom: 10px;
        }
        .lang-switcher button {
            background: transparent;
            border: 1px solid #333;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin: 0 4px;
            transition: all 0.2s;
        }
        .lang-switcher button.active {
            background: #00C26F;
            border-color: #00C26F;
            color: white;
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-top: 5px;
        }
        .widget-wrapper {
            width: 100%;
            margin: 10px 0;
        }
        iframe {
            width: 100%;
            height: 620px;
            border: none;
            border-radius: 16px;
            background: #fff;
            display: block;
        }
        footer {
            text-align: center;
            margin-top: 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 10px;
            color: #00C26F;
            text-decoration: none;
        }
        .disclaimer {
            font-size: 12px;
            color: #777;
        }
        .disclaimer a {
            color: #00C26F;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switcher">
            <button data-lang="ru" class="active">RU</button>
            <button data-lang="en">EN</button>
            <button data-lang="es">ES</button>
            <button data-lang="pt">PT</button>
            <button data-lang="tr">TR</button>
        </div>
        <h1>🔄 Покупка криптовалюты 🔄</h1>
        <p class="subtitle">Виджет от ChangeNOW – безопасно и быстро</p>

        <div class="widget-wrapper">
            <iframe id="changeNOW-widget"
                src="https://changenow.io/embeds/exchange-widget/v2/widget.html?FAQ=true&amount=0.1&amountFiat=1500&backgroundColor=1A1A1A&darkMode=true&from=btc&fromFiat=rub&horizontal=false&isFiat=true&lang=ru&link_id=9ccfa63406d1d6&locales=true&logo=true&primaryColor=00C26F&to=usdterc20&toFiat=rub&toTheMoon=true"
                style="height: 620px; width: 100%; border: none; border-radius: 16px;"></iframe>
        </div>

        <footer>
            <a href="/" class="back-link">← На главную</a>
            <p class="disclaimer">
                Сервис использует виджет ChangeNOW. Все обмены осуществляются через партнёра. 
                <a href="https://changenow.app.link/referral?link_id=9ccfa63406d1d6" target="_blank" rel="noopener noreferrer">Условия ChangeNOW</a>
            </p>
        </footer>
    </div>

    <script>
        // Функция обновления виджета при смене языка/валюты
        function updateWidget(lang, fromFiat, darkMode) {
            const iframe = document.getElementById('changeNOW-widget');
            if (!iframe) return;
            
            const baseUrl = 'https://changenow.io/embeds/exchange-widget/v2/widget.html';
            const params = {
                FAQ: 'true',
                amount: '0.1',
                amountFiat: '1500',
                backgroundColor: darkMode ? '1A1A1A' : 'FFFFFF',
                darkMode: darkMode ? 'true' : 'false',
                from: 'btc',
                fromFiat: fromFiat,
                horizontal: 'false',
                isFiat: 'true',
                lang: lang,
                link_id: '9ccfa63406d1d6',
                locales: 'true',
                logo: 'true',
                primaryColor: '00C26F',
                to: 'usdterc20',
                toFiat: fromFiat,
                toTheMoon: 'true'
            };
            const url = baseUrl + '?' + new URLSearchParams(params).toString();
            iframe.src = url;
        }

        // Получение параметров из URL
        function getQueryParam(param, defaultValue) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param) || defaultValue;
        }

        // Переключение языка
        function switchLanguage(targetLang) {
            const url = new URL(window.location.href);
            url.searchParams.set('lang', targetLang);
            const fiatMap = { ru: 'rub', en: 'usd', es: 'eur', pt: 'brl', tr: 'try' };
            url.searchParams.set('fromFiat', fiatMap[targetLang] || 'usd');
            if (!url.searchParams.has('darkMode')) url.searchParams.set('darkMode', 'true');
            window.location.href = url.toString();
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            let lang = getQueryParam('lang', 'ru');
            let fromFiat = getQueryParam('fromFiat', 'rub');
            let darkMode = getQueryParam('darkMode', 'true') === 'true';
            
            // Установка активной кнопки языка
            const buttons = document.querySelectorAll('.lang-switcher button');
            buttons.forEach(btn => {
                const btnLang = btn.getAttribute('data-lang');
                if (btnLang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetLang = btn.getAttribute('data-lang');
                    if (targetLang !== lang) {
                        switchLanguage(targetLang);
                    }
                });
            });
            
            // Обновляем виджет согласно параметрам
            updateWidget(lang, fromFiat, darkMode);
        });
    </script>
    <script defer type='text/javascript' src='https://changenow.io/embeds/exchange-widget/v2/stepper-connector.js'></script>
</body>
</html>
