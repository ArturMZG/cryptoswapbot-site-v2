    <meta name="telegram:theme-color" content="#00C26F">

    <!-- Подключаем общий стиль сайта -->
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    
    <style>
        /* Дополнительные стили только для страницы виджета */
        .widget-container {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            padding: 0 10px;
        }
        iframe {
            width: 100%;
            height: 620px;
            border: none;
            border-radius: 16px;
            background: transparent;
        }
        .back-link {
            display: inline-block;
            margin: 20px 0 10px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="lang-switcher">
            <button onclick="switchLang('ru')">RU</button>
            <button onclick="switchLang('en')">EN</button>
            <button onclick="switchLang('es')">ES</button>
            <button onclick="switchLang('pt')">PT</button>
            <button onclick="switchLang('tr')">TR</button>
        </div>
        <h1>🔄 Обмен криптовалют</h1>
        <p class="subtitle">Виджет от ChangeNOW – безопасно и быстро</p>
    </header>

    <div class="widget-container">
        <div id="widget-placeholder" style="text-align:center; padding:40px;">Загрузка виджета...</div>
    </div>

    <footer style="text-align: center; margin-top: 20px;">
        <a href="/" class="back-link">← На главную</a>
        <p class="disclaimer">
            Сервис использует виджет ChangeNOW. Все обмены осуществляются через партнёра. 
            <a href="https://changenow.io/terms" target="_blank">Условия ChangeNOW</a>
        </p>
    </footer>

    <script>
        // Функция получения параметров из URL
        function getQueryParam(param, defaultValue) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param) || defaultValue;
        }

        // Базовые параметры виджета (с подстановкой из URL)
        const link_id = '9ccfa63406d1d6';  // Ваш партнёрский ID (не менять!)
        let lang = getQueryParam('lang', 'ru');
        let darkMode = getQueryParam('darkMode', 'true');
        let fromFiat = getQueryParam('fromFiat', 'rub');
        let to = getQueryParam('to', 'usdterc20');
        let primaryColor = getQueryParam('primaryColor', '00C26F');
        
        // Преобразуем darkMode в строку true/false
        darkMode = (darkMode === 'true' || darkMode === true) ? 'true' : 'false';
        
        // Если тёмная тема, меняем фон body (стили из style.css уже поддерживают)
        if (darkMode === 'true') {
            document.body.style.backgroundColor = '#0f0f0f';
        } else {
            document.body.style.backgroundColor = '#f8f9fa';
        }
        
        // Формируем URL виджета
        let widgetUrl = `https://changenow.io/embeds/exchange-widget/v2/widget.html?link_id=${link_id}&lang=${lang}&darkMode=${darkMode}&fromFiat=${fromFiat}&to=${to}&primaryColor=${primaryColor}&isFiat=true&locales=true&logo=true&toTheMoon=true&FAQ=true&horizontal=false`;
        
        // Дополнительно: если передан from (криптовалюта) или amount – добавим
        let fromCoin = getQueryParam('from', '');
        let amount = getQueryParam('amount', '');
        if (fromCoin) widgetUrl += `&from=${fromCoin}`;
        if (amount) widgetUrl += `&amount=${amount}`;
        
        // Создаём iframe динамически
        const iframe = document.createElement('iframe');
        iframe.src = widgetUrl;
        iframe.style.width = '100%';
        iframe.style.height = '620px';
        iframe.style.border = 'none';
        iframe.style.borderRadius = '16px';
        iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
        
        const placeholder = document.getElementById('widget-placeholder');
        placeholder.parentNode.replaceChild(iframe, placeholder);
        
        // Подключаем скрипт-коннектор ChangeNOW
        const script = document.createElement('script');
        script.src = 'https://changenow.io/embeds/exchange-widget/v2/stepper-connector.js';
        script.defer = true;
        document.body.appendChild(script);
        
        // Слушаем сообщения от виджета (опционально)
        window.addEventListener('message', function(event) {
            if (event.origin !== 'https://changenow.io') return;
            if (event.data && event.data.type === 'transactionFinished') {
                console.log('Обмен завершён:', event.data);
                // Здесь можно отправить уведомление боту (через Webhook)
            }
        });
    </script>

    <!-- Скрипт мультиязычности (адаптированный для exchange.html) -->
    <script>
        (function() {
            const supportedLangs = ['en', 'es', 'pt', 'tr'];
            const defaultLang = 'ru';
            
            function getCurrentPageLang() {
                const urlParams = new URLSearchParams(window.location.search);
                const langParam = urlParams.get('lang');
                if (langParam && supportedLangs.includes(langParam)) return langParam;
                if (langParam === 'ru') return 'ru';
                // Если нет параметра, пробуем определить по localStorage или navigator
                return defaultLang;
            }
            
            window.switchLang = function(targetLang) {
                if (targetLang === getCurrentPageLang()) return;
                // Перенаправляем на ту же страницу, но с новым параметром lang
                const url = new URL(window.location.href);
                url.searchParams.set('lang', targetLang);
                // Также меняем fromFiat в соответствии с языком (по желанию)
                const fiatMap = { ru: 'rub', en: 'usd', es: 'eur', pt: 'brl', tr: 'try' };
                url.searchParams.set('fromFiat', fiatMap[targetLang] || 'usd');
                window.location.href = url.toString();
            };
            
            // Автоматическое определение языка при первом визите (если нет параметра lang)
            const urlLang = new URLSearchParams(window.location.search).get('lang');
            if (!urlLang) {
                let savedLang = localStorage.getItem('site_lang');
                if (!savedLang) {
                    const browserLang = (navigator.language || 'en').toLowerCase();
                    if (browserLang.startsWith('ru')) savedLang = 'ru';
                    else if (browserLang.startsWith('es')) savedLang = 'es';
                    else if (browserLang.startsWith('pt')) savedLang = 'pt';
                    else if (browserLang.startsWith('tr')) savedLang = 'tr';
                    else savedLang = 'en';
                    localStorage.setItem('site_lang', savedLang);
                }
                // Перенаправляем с установкой параметра lang
                const newUrl = new URL(window.location.href);
                newUrl.searchParams.set('lang', savedLang);
                const fiatMap = { ru: 'rub', en: 'usd', es: 'eur', pt: 'brl', tr: 'try' };
                newUrl.searchParams.set('fromFiat', fiatMap[savedLang] || 'usd');
                window.location.href = newUrl.toString();
            } else {
                // Сохраняем выбранный язык в localStorage
                localStorage.setItem('site_lang', urlLang);
            }
        })();
    </script>
</body>
</html>
